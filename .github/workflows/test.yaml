on:
  push:
    branches:
      - main
    tags-ignore:
      - '*'
name: test
jobs:
  uninstall:
    runs-on: master
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: build
      run: make get build
    - name: uninstall
      run: make uninstall
    - name: install
      run: make install
    timeout-minutes: 10