on:
  push:
    branches:
      - main
    tags-ignore:
      - '*'
name: test
jobs:
  test:
    runs-on: master
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: build
      run: make get build
    - name: wol
      run: make wol
    - name: uninstall
      run: make uninstall
    - name: install
      run: make install
